name: 每天更新 IP 数据库并上传到 R2

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-database:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      # ========== 1. 下载纯真标准版数据库 ==========
      - name: 下载纯真标准版 IP 数据库
        run: |
          echo "开始下载纯真标准版 IP 数据库..."
          curl -L -o qqwry.ipdb \
            "https://github.com/nmgliangwei/qqwry.ipdb/releases/latest/download/qqwry.ipdb"
          
          file_size=$(stat -c%s qqwry.ipdb)
          echo "纯真数据库大小: $file_size 字节"
          
          if [ $file_size -lt 1000000 ]; then
            echo "❌ 纯真数据库下载失败（文件太小）"
            exit 1
          fi
          
          echo "✅ 纯真数据库下载成功"
          ls -lh qqwry.ipdb
          md5sum qqwry.ipdb > qqwry.ipdb.md5
      
      # ========== 2. 从 GitHub 下载 GeoCN 数据库 ==========
      - name: 从 GitHub 下载 GeoCN 中国高精度数据库
        run: |
          echo "开始从 GitHub 下载 GeoCN 数据库..."
          
          # 方法1：从 GitHub Release 下载（推荐）
          echo "尝试从 GitHub Release 下载..."
          curl -L -o GeoCN.mmdb \
            "https://github.com/ljxi/GeoCN/releases/latest/download/GeoCN.mmdb"
          
          # 检查下载是否成功
          if [ -f GeoCN.mmdb ]; then
            file_size=$(stat -c%s GeoCN.mmdb)
            echo "下载文件大小: $file_size 字节"
            
            if [ $file_size -gt 100000 ]; then
              echo "✅ GeoCN 数据库下载成功"
              ls -lh GeoCN.mmdb
              md5sum GeoCN.mmdb > GeoCN.mmdb.md5
            else
              echo "⚠️ 文件过小，尝试从仓库直接下载..."
              # 方法2：从仓库的 db 目录下载
              curl -L -o GeoCN.mmdb \
                "https://raw.githubusercontent.com/ljxi/GeoCN/main/db/GeoCN.mmdb"
              
              file_size2=$(stat -c%s GeoCN.mmdb)
              if [ $file_size2 -gt 100000 ]; then
                echo "✅ GeoCN 数据库下载成功（从仓库）"
                ls -lh GeoCN.mmdb
                md5sum GeoCN.mmdb > GeoCN.mmdb.md5
              else
                echo "❌ GeoCN 数据库下载失败"
                rm -f GeoCN.mmdb
              fi
            fi
          else
            echo "❌ GeoCN 数据库下载失败"
          fi
      
      # ========== 3. 下载行政区划数据 (用于 GeoCN division_code 解析) ==========
      - name: 下载行政区划数据 (full.txt / short.txt)
        run: |
          echo "开始下载行政区划数据..."
          
          # 下载 full.txt (全称: 北京市/东城区/朝阳区)
          curl -L -o full.txt \
            "https://raw.githubusercontent.com/ljxi/GeoCN/main/data/full.txt"
          
          if [ -f full.txt ]; then
            fs=$(stat -c%s full.txt)
            echo "full.txt 大小: $fs 字节"
            if [ $fs -gt 1000 ]; then
              echo "✅ full.txt 下载成功"
              md5sum full.txt > full.txt.md5
            else
              echo "❌ full.txt 下载失败（文件太小）"
              rm -f full.txt
            fi
          else
            echo "❌ full.txt 下载失败"
          fi
          
          # 下载 short.txt (简称: 北京/东城/朝阳)
          curl -L -o short.txt \
            "https://raw.githubusercontent.com/ljxi/GeoCN/main/data/short.txt"
          
          if [ -f short.txt ]; then
            fs=$(stat -c%s short.txt)
            echo "short.txt 大小: $fs 字节"
            if [ $fs -gt 1000 ]; then
              echo "✅ short.txt 下载成功"
              md5sum short.txt > short.txt.md5
            else
              echo "❌ short.txt 下载失败（文件太小）"
              rm -f short.txt
            fi
          else
            echo "❌ short.txt 下载失败"
          fi
      
      # ========== 4. 安装上传工具 ==========
      - name: 安装 s3cmd
        run: |
          sudo apt-get update
          sudo apt-get install -y s3cmd
      
      # ========== 5. 上传到 R2 ==========
      - name: 上传到 R2
        env:
          R2_ACCESS_KEY: d44a21a8c1604a4127d998d46325c4e4
          R2_SECRET_KEY: 339548d6f71d1f136da87bf927df1b1e886fb7374fbf4ac219c59f051c7007e8
          R2_ENDPOINT: https://cc057720e5a172a42c6d15693016bf33.r2.cloudflarestorage.com
          R2_BUCKET: ipdb-storage
        run: |
          # 配置 s3cmd
          cat > ~/.s3cfg << EOF
          [default]
          access_key = $R2_ACCESS_KEY
          secret_key = $R2_SECRET_KEY
          host_base = $(echo $R2_ENDPOINT | sed 's|https://||')
          host_bucket = $(echo $R2_ENDPOINT | sed 's|https://||')
          use_https = True
          EOF
          
          # 上传纯真数据库
          s3cmd put qqwry.ipdb s3://$R2_BUCKET/qqwry.ipdb
          s3cmd put qqwry.ipdb.md5 s3://$R2_BUCKET/qqwry.ipdb.md5
          echo "✅ 纯真数据库已上传"
          
          # 上传 GeoCN 数据库（如果存在）
          if [ -f GeoCN.mmdb ]; then
            s3cmd put GeoCN.mmdb s3://$R2_BUCKET/GeoCN.mmdb
            s3cmd put GeoCN.mmdb.md5 s3://$R2_BUCKET/GeoCN.mmdb.md5
            echo "✅ GeoCN 数据库已上传到 R2"
          else
            echo "⚠️ GeoCN 数据库不存在，跳过上传"
          fi
          
          # 上传行政区划数据 (R2 key: data/full.txt, data/short.txt)
          if [ -f full.txt ]; then
            s3cmd put full.txt s3://$R2_BUCKET/data/full.txt
            s3cmd put full.txt.md5 s3://$R2_BUCKET/data/full.txt.md5
            echo "✅ full.txt 行政区划数据已上传"
          else
            echo "⚠️ full.txt 不存在，跳过上传"
          fi
          
          if [ -f short.txt ]; then
            s3cmd put short.txt s3://$R2_BUCKET/data/short.txt
            s3cmd put short.txt.md5 s3://$R2_BUCKET/data/short.txt.md5
            echo "✅ short.txt 行政区划数据已上传"
          else
            echo "⚠️ short.txt 不存在，跳过上传"
          fi
          
          echo "✅ 所有文件上传完成"
      
      # ========== 6. 创建版本信息 ==========
      - name: 创建版本信息
        run: |
          echo "更新时间: $(date '+%Y-%m-%d %H:%M:%S')" > version.txt
          echo "===================================" >> version.txt
          echo "纯真数据库 (标准版):" >> version.txt
          echo "  文件: qqwry.ipdb" >> version.txt
          echo "  大小: $(ls -lh qqwry.ipdb | awk '{print $5}')" >> version.txt
          echo "  MD5: $(cut -d' ' -f1 qqwry.ipdb.md5)" >> version.txt
          echo "" >> version.txt
          
          if [ -f GeoCN.mmdb ]; then
            echo "GeoCN 数据库 (中国高精度):" >> version.txt
            echo "  文件: GeoCN.mmdb" >> version.txt
            echo "  大小: $(ls -lh GeoCN.mmdb | awk '{print $5}')" >> version.txt
            echo "  MD5: $(cut -d' ' -f1 GeoCN.mmdb.md5)" >> version.txt
            echo "  来源: GitHub (ljxi/GeoCN)" >> version.txt
            echo "" >> version.txt
            echo "GeoCN 状态: ✅ 已下载" >> version.txt
          else
            echo "GeoCN 状态: ❌ 下载失败" >> version.txt
          fi
          
          echo "" >> version.txt
          echo "行政区划数据 (GeoCN division_code 解析):" >> version.txt
          if [ -f full.txt ]; then
            echo "  full.txt (全称): ✅ $(ls -lh full.txt | awk '{print $5}')" >> version.txt
          else
            echo "  full.txt (全称): ❌ 下载失败" >> version.txt
          fi
          if [ -f short.txt ]; then
            echo "  short.txt (简称): ✅ $(ls -lh short.txt | awk '{print $5}')" >> version.txt
          else
            echo "  short.txt (简称): ❌ 下载失败" >> version.txt
          fi
          
          echo "===================================" >> version.txt
      
      # ========== 7. 提交并推送到 GitHub ==========
      - name: 提交并推送
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 拉取最新代码
          git pull origin main --rebase || true
          
          # 添加纯真数据库文件
          git add qqwry.ipdb qqwry.ipdb.md5
          
          # 如果有 GeoCN 文件就添加
          if [ -f GeoCN.mmdb ]; then
            git add GeoCN.mmdb GeoCN.mmdb.md5
          fi
          
          # 添加行政区划数据文件
          if [ -f full.txt ]; then
            git add full.txt full.txt.md5
          fi
          if [ -f short.txt ]; then
            git add short.txt short.txt.md5
          fi
          
          git add version.txt
          
          # 提交
          git diff --staged --quiet || git commit -m "🤖 更新 IP 数据库 - $(date '+%Y-%m-%d')
          
          - 纯真标准版: 日常更新
          - GeoCN 高精度: $(if [ -f GeoCN.mmdb ]; then echo '已更新'; else echo '下载失败'; fi)
          - 行政区划数据: $(if [ -f full.txt ] && [ -f short.txt ]; then echo '已更新'; else echo '部分失败'; fi)
          - 来源: GitHub (nmliangwei/qqwry.ipdb + ljxi/GeoCN)"
          
          # 推送
          git pull origin main --rebase || true
          git push origin main
