name: 每天更新 IP 数据库

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-database:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 从 GitHub Release 下载 qqwry-raw.ipdb
      run: |
        echo "开始下载 qqwry-raw.ipdb ..."
        
        # 方法1: 直接从最新 Release 下载
        curl -L -o qqwry-raw.ipdb \
          "https://github.com/nmgliangwei/qqwry.ipdb/releases/latest/download/qqwry-raw.ipdb" \
          -H "User-Agent: Mozilla/5.0"
        
        # 检查大小
        if [ -f qqwry-raw.ipdb ]; then
          FILE_SIZE=$(stat -c%s qqwry-raw.ipdb 2>/dev/null || stat -f%z qqwry-raw.ipdb 2>/dev/null)
          echo "文件大小: $FILE_SIZE 字节"
          
          if [ "$FILE_SIZE" -gt 1000000 ]; then
            echo "✅ 下载成功"
          else
            echo "文件太小，尝试备用方法..."
            # 方法2: 使用具体版本号
            curl -L -o qqwry-raw.ipdb \
              "https://github.com/nmgliangwei/qqwry.ipdb/releases/download/20260603/qqwry-raw.ipdb" \
              -H "User-Agent: Mozilla/5.0"
            
            FILE_SIZE2=$(stat -c%s qqwry-raw.ipdb 2>/dev/null || stat -f%z qqwry-raw.ipdb 2>/dev/null)
            if [ "$FILE_SIZE2" -lt 1000000 ]; then
              echo "❌ 下载失败"
              exit 1
            fi
          fi
        else
          echo "❌ 文件不存在"
          exit 1
        fi
        
        ls -lh qqwry-raw.ipdb
        md5sum qqwry-raw.ipdb > qqwry-raw.ipdb.md5
    
    - name: 创建版本信息
      run: |
        echo "更新时间: $(date '+%Y-%m-%d %H:%M:%S')" > version.txt
        echo "文件: qqwry-raw.ipdb" >> version.txt
        echo "文件大小: $(ls -lh qqwry-raw.ipdb | awk '{print $5}')" >> version.txt
        echo "MD5: $(cut -d' ' -f1 qqwry-raw.ipdb.md5)" >> version.txt
    
    - name: 提交并推送
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        git add qqwry-raw.ipdb qqwry-raw.ipdb.md5 version.txt
        git diff --staged --quiet || git commit -m "🤖 自动更新 IP 数据库 - $(date '+%Y-%m-%d')"
        git push origin main
